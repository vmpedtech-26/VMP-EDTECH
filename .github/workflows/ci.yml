name: CI Pipeline

on:
  push:
    branches: [ main, develop ]
  pull_request:
    branches: [ main, develop ]

jobs:
  backend-test:
    runs-on: ubuntu-latest
    
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_DB: vmp_test_db
          POSTGRES_PASSWORD: postgrespassword
        ports:
          - 5432:5432
        options: >-
          --health-cmd pg_isready
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r apps/api/requirements.txt
          pip install pytest pytest-asyncio pytest-cov httpx

      - name: Generate Prisma Client
        run: |
          cd apps/api
          python -m prisma generate

      - name: Push Schema to Test Database
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/vmp_test_db
        run: |
          cd apps/api
          python -m prisma db push --accept-data-loss

      - name: Run Pytest Suite
        env:
          DATABASE_URL: postgresql://postgres:postgrespassword@localhost:5432/vmp_test_db
          JWT_SECRET: testing-secret-key-1234567890
          JWT_ALGORITHM: HS256
          ACCESS_TOKEN_EXPIRE_MINUTES: 60
          SMTP_PASSWORD: TU_API_KEY_AQUI
          GEMINI_API_KEY: AIzaSyD2cD22gGwIhkpejMClwobMugiDNnByYow
        run: |
          cd apps/api
          PYTHONPATH=. pytest --cov=. --cov-report=term-missing

  frontend-build:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      - name: Install Dependencies
        run: |
          npm install

      - name: Run Next.js Linting
        run: |
          npm run lint

      - name: Build Next.js Production Bundle
        env:
          NEXT_PUBLIC_API_URL: http://localhost:8000
        run: |
          npm run build
